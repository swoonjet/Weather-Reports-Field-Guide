<!-- index.html  —  FIELD GUIDE prototype
================================================
README
------------------------------------------------
This prototype showcases short-fiction “specimens” with:
• Hero banner
• Filterable specimen grid (up to 40 items)
• Story viewer modal

File structure in repo/folder:
  index.html   – markup + README
  style.css    – theming & layout (CSS custom props)
  script.js    – data, filtering logic, modal UX

Extending specimens / filters:
1. Open script.js and add objects to the `specimens` array  
   - Each object needs: id, title, tags[], excerpt, fullText  
2. To introduce new filter parameters, simply include new tag
   strings in specimen objects; the UI builds itself dynamically.

Deploy by dropping all three files into any static host
(GitHub Pages, Replit Static, Netlify Drop, etc.).
================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Field Guide – Story Specimens</title>
  <link rel="stylesheet" href="style.css">
  <!-- Preload a serif for reading pane -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <!-- ▸ HERO BANNER ----------------------------------------------------- -->
  <header class="hero" role="banner" aria-label="Field Guide hero">
    <div class="hero__inner">
      <h1 class="hero__title">Field Guide to the Phenomenon</h1>
      <p class="hero__tagline">Collected observations, case studies &amp; literary specimens</p>
    </div>
  </header>

  <main class="main">
    <!-- ▸ FILTER PANEL -------------------------------------------------- -->
    <aside class="filters" aria-labelledby="filters-heading">
      <h2 id="filters-heading" class="visually-hidden">Filter specimens</h2>
      <form id="filterForm" aria-label="Specimen filters"></form>
    </aside>

    <!-- ▸ SPECIMEN GRID ------------------------------------------------- -->
    <section id="specimenGrid"
             class="grid"
             aria-live="polite"
             aria-label="Specimen grid">
    </section>
  </main>

  <!-- ▸ STORY VIEWER MODAL --------------------------------------------- -->
  <div id="storyModal"
       class="modal"
       role="dialog"
       aria-modal="true"
       aria-labelledby="storyTitle"
       hidden>
    <div class="modal__content" tabindex="0">
      <button class="modal__close" aria-label="Close story viewer">&times;</button>
      <h2 id="storyTitle" class="story__title"></h2>
      <article id="storyBody" class="story__body"></article>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
